baseURL = 'https://tenyoru.io/'
locale = 'en-us'
title = 'Tenyoru'
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    weight = 1
  [languages.fr]
    weight = 2
  [languages.ru]
    weight = 3

[params]
description = "A personal corner for engineering notes, writing, and new collaborations"
r2BaseURL = "https://assets.tenyoru.io"
r2Transforms = true

[params.contact.hero]
title = "Let's build something together"
body = "Got something on your mind? Whether it's a project, a question, or just to talk shop — drop me a line."

[params.contact.contacts]
heading = "Pick the channel that suits you"
intro = "Every message lands in my personal inbox, so feel free to be detailed."

  [[params.contact.contacts.items]]
  label = "Email"
  value = "mail@tenyoru.io"
  url = "mailto:mail@tenyoru.io"
  icon = "mail"

  [[params.contact.contacts.items]]
  label = "Matrix"
  value = "@a:tenyoru.io"
  url = "https://matrix.to/#/@a:tenyoru.io"
  icon = "matrix"

  [[params.contact.contacts.items]]
  label = "Telegram"
  value = "@tenyoru"
  url = "https://t.me/tenyoru"
  icon = "telegram"

  [[params.contact.contacts.items]]
  label = "WhatsApp"
  value = "+44 745 689 1686"
  url = "https://wa.me/447456891686"
  icon = "whatsapp"

[[params.media]]
label = "GitHub"
value = "tenyoru"
url = "https://github.com/tenyoru"
icon = "github"

# [[params.media]]
# label = "Codeberg"
# value = "tenyoru"
