# icon = "codeberg"

[[params.media]]
label = "Bluesky"
value = "@tenyoru.io"
url = "https://bsky.app/profile/tenyoru.io"
icon = "bluesky"

[[params.media]]
label = "Mastodon"
value = "@tenyoru@mastodon.social"
url = "https://mastodon.social/@tenyoru"
icon = "mastodon"

[[params.media]]
label = "Telegram"
value = "@tenyoru"
url = "https://t.me/tenyoru_hub"
icon = "telegram"

[[params.projects]]
name = "topo.love"
desc = "Startup I'm currently building"
url = "https://topo.love"
icon = "topo"

[params.footer]
credits = "© 2026 Tenyoru"

[params.giscus]
repo = "tenyoru/Tenyoru.github.io"
repoID = "R_kgDOP75SYA"
category = "Announcements"
categoryID = "DIC_kwDOP75SYM4CwgqS"
mapping = "pathname"
strict = "0"
reactionsEnabled = "1"
emitMetadata = "0"
inputPosition = "bottom"
theme = "preferred_color_scheme"
lang = "en"
themeLight = "light"
themeDark = "dark"

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[menus]
  [[menus.main]]
    name = 'Blog'
    url = '/blog/'
    weight = 10

  [[menus.main]]
    name = 'Photos'
    url = '/photos/'
    weight = 25

  [[menus.main]]
    name = 'Contact'
    url = '/contact/'
    weight = 30

[security]
  enableInlineShortcodes = true
[markup.goldmark.renderer]
unsafe = true
[markup.highlight]
noClasses = false
style = "monokai"
