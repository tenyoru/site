{{- $page := .page -}}
{{- $cleanDesc := replaceRE "\\s+" " " ($page.Description | plainify) -}}
{{- $excerpt := cond (gt (len $cleanDesc) 0) ($cleanDesc | truncate 120) "" -}}

<li class="post-item">
  <a href="{{ $page.RelPermalink }}" class="list__link">
    <span class="list__link-title">{{ $page.LinkTitle }}</span>
    <span class="list__link-date">
      <time datetime="{{ $page.Date.Format "2006-01-02" }}">{{ $page.Date.Format "Jan 2, 2006" }}</time>
    </span>
  </a>
  {{- if $excerpt -}}
  <p class="post-item__excerpt">{{ $excerpt }}</p>
  {{- end -}}
</li>
