{{- $src   := .Get "src" -}}
{{- $base  := site.Params.r2BaseURL -}}
{{- $full  := printf "%s/%s" $base $src -}}
{{- $thumb := $full -}}
{{- if site.Params.r2Transforms -}}
  {{- $thumb = printf "%s/%s/%s" $base site.Params.r2Thumb $src -}}
{{- end -}}
<figure class="photo-grid__item">
  <a href="{{ $full }}">
    <img src="{{ $thumb }}" alt="" loading="lazy" decoding="async">
  </a>
</figure>
